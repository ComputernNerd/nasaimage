<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NASA Viewer</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #0b0f1a;
            color: white;
            margin: 0;
            padding: 10px;
            padding-bottom: 80px;
        }

        h1 { font-size: 1.6rem; }
        #title { margin: 10px 0; opacity: 0.85; }

        .media-container {
            width: 100%;
            max-width: 900px;
            margin: 10px auto;
            border-radius: 10px;
            overflow: hidden;
            background: #111;
        }

        .media-container img {
            width: 100%;
            max-height: 70vh;
            filter: blur(20px);
            transform: scale(1.05);
            transition: 0.5s;
        }

        .media-container img.loaded {
            filter: blur(0);
            transform: scale(1);
        }

        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
        }

        iframe {
            position: absolute;
            width: 100%;
            height: 100%;
            border: none;
        }

        #descriptionBox {
            max-width: 900px;
            margin: 25px auto;
            padding: 15px;
            background: #2a2f3a;
            border-radius: 12px;
            text-align: left;

            opacity: 0;
            transform: translateY(10px);
            transition: 0.4s;
        }

        #descriptionBox.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #nextBtn {
            margin-top: 15px;
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            background: #4c8bf5;
            color: white;
        }

        #rateLimit {
            position: fixed;
            bottom: 8px;
            left: 8px;
            font-size: 11px;
            opacity: 0.6;
        }
    </style>
</head>
<body>

<h1>NASA random image Viewer</h1>
<h4>If the rate limit is met, the image will fail to load.</h4>
<p id="title"></p>

<div id="content"></div>

<button id="nextBtn">Next</button>

<div id="descriptionBox">
    <strong>Description</strong>
    <div id="description"></div>
</div>

<div id="rateLimit"></div>

<script>
const btn = document.getElementById("nextBtn");

let cache = [];

async function fetchBatch() {
    const url = "https://api.nasa.gov/planetary/apod?api_key=5jXpLU3I50QVYG9JZWD6M7BDIBA2lFShp0hRCBBD&count=4";

    const res = await fetch(url);

    // rate limit
    const limit = res.headers.get("x-ratelimit-limit");
    const remaining = res.headers.get("x-ratelimit-remaining");

    document.getElementById("rateLimit").innerText =
        limit ? `${remaining}/${limit}` : "";

    const data = await res.json();

    // preload images
    data.forEach(item => {
        if (item.media_type === "image") {
            const img = new Image();
            img.src = item.hdurl || item.url;
        }
    });

    cache.push(...data);
}

async function loadNext() {
    if (cache.length === 0) {
        await fetchBatch();
    }

    // keep buffer filled
    if (cache.length < 2) {
        fetchBatch();
    }

    const apod = cache.shift();

    render(apod);
}

function render(apod) {
    const container = document.getElementById("content");
    const descBox = document.getElementById("descriptionBox");

    container.innerHTML = "Loading...";
    descBox.classList.remove("visible");

    document.getElementById("title").innerText = apod.title;
    document.getElementById("description").innerText = apod.explanation;

    if (apod.media_type === "image") {
        const wrapper = document.createElement("div");
        wrapper.className = "media-container";

        const img = document.createElement("img");
        img.src = apod.url;

        const high = new Image();
        high.src = apod.hdurl || apod.url;

        high.onload = () => {
            img.src = high.src;
            img.classList.add("loaded");
            descBox.classList.add("visible");
        };

        wrapper.appendChild(img);
        container.innerHTML = "";
        container.appendChild(wrapper);

    } else {
        const wrapper = document.createElement("div");
        wrapper.className = "media-container";

        const videoWrapper = document.createElement("div");
        videoWrapper.className = "video-wrapper";

        const iframe = document.createElement("iframe");

        iframe.src = apod.url.includes("youtube")
            ? `https://www.youtube.com/embed/${apod.url.split("v=")[1]?.split("&")[0]}`
            : apod.url;

        setTimeout(() => {
            videoWrapper.appendChild(iframe);
            wrapper.appendChild(videoWrapper);
            container.innerHTML = "";
            container.appendChild(wrapper);
            descBox.classList.add("visible");
        }, 500);
    }
}

btn.onclick = loadNext;

// initial load
fetchBatch().then(loadNext);
</script>

</body>
</html>
